<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Health Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SkyNode Solutions - Monitoramento</h1>
    </header>
    
    <main>
        <section class="dashboard"> 
            <div id="card-cpu" class="card">
                <h2>CPU</h2>
                <p class="valor">0%</p>
            </div>
            <div id="card-ram" class="card">
                <h2>Memória RAM</h2>
                <p class="valor">0 GB</p>
            </div>
            <div id="card-temp" class="card">
                <h2>Temperatura</h2>
                <p class="valor">0 °C</p>
            </div>
        </section>
    </main>

    <footer>
        <p>Dashboard atualizado em tempo real.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
